<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOHM Admin — Paramètres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/admin/shared.js"></script>
</head>
<body>
  <div class="admin-main">
    <h1>Paramètres</h1>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="font-size:16px">Présentation WOHM</h2>
        <span style="font-size:12px;color:var(--text-muted)">Affiché sur toutes les pages d'annonces</span>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <div id="presentation-editor" class="rich-editor" contenteditable="true" data-placeholder="Rédigez la présentation de WOHM..." style="min-height:160px;padding:12px;background:var(--deep);border:1px solid var(--border);border-radius:6px;outline:none;line-height:1.6;font-size:14px"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="rich-toolbar" style="display:flex;gap:4px">
          <button class="btn btn-sm btn-secondary" id="fmt-bold" title="Gras" style="font-weight:700">B</button>
          <button class="btn btn-sm btn-secondary" id="fmt-italic" title="Italique" style="font-style:italic">I</button>
          <button class="btn btn-sm btn-secondary" id="fmt-underline" title="Souligné" style="text-decoration:underline">U</button>
        </div>
        <button class="btn btn-sm btn-primary" id="btn-save-presentation">Enregistrer</button>
        <span id="presentation-status" style="font-size:12px;color:var(--success);display:none">Enregistré</span>
      </div>
    </div>
  </div>

  <script>
    injectAdminStyles();
    renderAdminNav('/admin/settings.html');

    var presentationEditor = document.getElementById('presentation-editor');

    async function loadPresentation() {
      try {
        var res = await fetchAPI('/api/admin/settings/company_presentation');
        var data = await res.json();
        if (data.value) presentationEditor.innerHTML = sanitizeHtml(data.value);
        updatePlaceholder();
      } catch (err) { console.error('Load presentation error:', err); }
    }

    document.getElementById('btn-save-presentation').addEventListener('click', async function() {
      var btn = this;
      btn.disabled = true;
      try {
        await fetchAPI('/api/admin/settings/company_presentation', {
          method: 'PUT',
          body: { value: presentationEditor.innerHTML },
        });
        var status = document.getElementById('presentation-status');
        status.style.display = 'inline';
        setTimeout(function() { status.style.display = 'none'; }, 2000);
      } catch (err) { console.error('Save presentation error:', err); }
      btn.disabled = false;
    });

    document.getElementById('fmt-bold').addEventListener('click', function() { document.execCommand('bold'); presentationEditor.focus(); });
    document.getElementById('fmt-italic').addEventListener('click', function() { document.execCommand('italic'); presentationEditor.focus(); });
    document.getElementById('fmt-underline').addEventListener('click', function() { document.execCommand('underline'); presentationEditor.focus(); });

    function updatePlaceholder() {
      if (!presentationEditor.textContent.trim()) {
        presentationEditor.setAttribute('data-empty', 'true');
      } else {
        presentationEditor.removeAttribute('data-empty');
      }
    }
    presentationEditor.addEventListener('input', updatePlaceholder);
    presentationEditor.addEventListener('focus', updatePlaceholder);
    presentationEditor.addEventListener('blur', updatePlaceholder);

    loadPresentation();
  </script>
</body>
</html>
