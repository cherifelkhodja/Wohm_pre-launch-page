<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOHM — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2EA3E0;
      --deep: #060A13;
      --surface: #0B1120;
      --text: #E8EDF5;
      --text-muted: #8A94A6;
      --border: #1A2235;
      --error: #E74C3C;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-card p {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--blue);
    }
    .form-group input.error {
      border-color: var(--error);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: var(--error);
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      min-height: 20px;
    }
    .logo {
      display: block;
      width: 80px;
      margin: 0 auto 24px;
    }
    html.light { --deep: #F5F7FA; --surface: #FFFFFF; --text: #1A1A2E; --text-muted: #6B7280; --border: #E5E7EB; }
    html.light .form-group input { background: #F9FAFB; border-color: #E5E7EB; color: #1A1A2E; }
    .theme-toggle {
      position: fixed; top: 20px; right: 20px; width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleLoginTheme()"></button>
  <div class="login-card">
    <img src="/assets/Wohm - Dark.png" alt="WOHM" class="logo" id="logo-img">
    <h1>Administration</h1>
    <p>Connectez-vous pour accéder au panneau admin.</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@wohm.fr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Se connecter</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script>
    // Theme toggle for login page
    function updateLoginUI() {
      var isLight = document.documentElement.classList.contains('light');
      document.getElementById('theme-toggle').textContent = isLight ? '\u{1F319}' : '\u{2600}\uFE0F';
      document.getElementById('logo-img').src = isLight ? '/assets/Wohm - Light.png' : '/assets/Wohm - Dark.png';
    }
    function toggleLoginTheme() {
      document.documentElement.classList.toggle('light');
      var isLight = document.documentElement.classList.contains('light');
      localStorage.setItem('admin-theme', isLight ? 'light' : 'dark');
      updateLoginUI();
    }
    // Init theme from localStorage
    if (localStorage.getItem('admin-theme') === 'light') {
      document.documentElement.classList.add('light');
    }
    updateLoginUI();

    var form = document.getElementById('login-form');
    var btn = document.getElementById('btn-submit');
    var errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.textContent = '';
      btn.disabled = true;
      btn.textContent = '...';

      try {
        var res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        var data = await res.json();

        if (res.ok) {
          window.location.href = '/admin/';
        } else {
          errorMsg.textContent = data.error || 'Erreur de connexion.';
        }
      } catch (err) {
        errorMsg.textContent = 'Erreur réseau. Réessayez.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
